name: Test Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "examples/**"
      - "README.md"
      - "README"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "examples/**"
      - "README.md"
      - "README"

jobs:
  build:
    name: Build App for Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod or go.sum out of date — run 'go mod tidy' locally" >&2
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Run Tests (race detector)
        run: go test -race -count=1 ./...

      - name: Build Release Binaries
        run: ./scripts/build.sh

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: test-build-artifacts
          path: bin/
          retention-days: 7

  security:
    name: gosec Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run gosec (HIGH severity, excluding intentional G402)
        run: make sec
