# Zero Trust Proxy — server configuration
# Schema reference: config/server.yaml.example

listen:
  http:  ":80"
  https: ":443"
  http_redirect: true   # 308 HTTP → HTTPS; acme-challenge bypass is automatic

tls:
  mode: acme
  acme:
    storage_dir: /config/acme
    email: ops@example.com
    # ca_url: ""        # override Let's Encrypt CA (e.g. staging URL for testing)

agents:
  listen:    ":8443"
  cert_file: /config/certs/server.crt
  key_file:  /config/certs/server.key
  ca_file:   /config/certs/ca.crt
  check_addr: ":2020"

router:
  request_timeout: 2m

logging:
  level:      info     # debug | info | warn | error
  format:     console  # console | json
  access_log: false

metrics:
  addr: ""             # e.g. "127.0.0.1:9100" — no auth, bind to private interface
